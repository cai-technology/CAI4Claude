name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test — Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test -- --run

      - name: Smoke test CLI
        run: node dist/cli.js --version

  lint-internal-refs:
    name: Lint — no internal references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked internal hostnames or LAN IPs
        run: |
          if grep -rnE "caitech\.local|10\.11\.[0-9]+\.[0-9]+" src/ scripts/ grafana/ README.md CHANGELOG.md 2>/dev/null; then
            echo "ERROR: internal hostnames or LAN IPs leaked into source."
            exit 1
          fi
          echo "OK — no internal references detected."
